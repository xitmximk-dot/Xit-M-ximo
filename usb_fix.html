<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE PAREAMENTO BRUTO</title>
    <style>
        body {
            background: #000;
            color: #ff0000;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            border: 2px solid #ff0000;
            padding: 20px;
            background: #050505;
            box-shadow: 0 0 20px #ff0000;
            width: 320px;
            text-align: center;
        }

        .log {
            background: #000;
            border: 1px solid #222;
            height: 150px;
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            font-size: 11px;
            overflow-y: auto;
            text-align: left;
            color: #00ff00;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #ff0000;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            text-transform: uppercase;
        }

        button:active {
            background: #900;
        }

        .status {
            margin-bottom: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="letter-spacing: 2px;">USB RECOVERY V2</h2>
        <div class="status">ESTADO: <span id="st">AGUARDANDO CABO</span></div>
        <button onclick="masterConnect()">FORÇAR CONEXÃO USB</button>
        <button onclick="triggerRSA()">DISPARAR QUADRO RSA</button>
        <div class="log" id="console">&gt; Sistema de prontidão...</div>
    </div>

    <script>
        let device;

        function log(m) {
            const c = document.getElementById('console');
            c.innerHTML += `<br>&gt; ${m}`;
            c.scrollTop = c.scrollHeight;
        }

        async function masterConnect() {
            try {
                log("Solicitando permissão de hardware...");
                device = await navigator.usb.requestDevice({ filters: [] });

                log("Abrindo canal de comunicação...");
                await device.open();

                log("Resetando barramento de dados...");
                await device.reset();

                log("Selecionando configuração de interface...");
                if (device.configuration === null) await device.selectConfiguration(1);

                log("Reivindicando Interface 0 (ADB)...");
                await device.claimInterface(0);

                document.getElementById('st').innerText = "PAREADO";
                document.getElementById('st').style.color = "#00ff00";
                log("CONECTADO COM SUCESSO!");
            } catch (e) {
                log("ERRO CRÍTICO: " + e.message);
                if (e.message && e.message.toLowerCase().includes("busy")) log("DICA: Feche apps de USB no celular.");
            }
        }

        async function triggerRSA() {
            if (!device || !device.opened) {
                alert("Primeiro clique em FORÇAR CONEXÃO!");
                return;
            }

            log("Enviando Handshake de Autorização...");
            try {
                const data = new Uint8Array([
                    0x43, 0x4e, 0x4e, 0x58,
                    0x00, 0x00, 0x00, 0x01,
                    0x00, 0x10, 0x00, 0x00
                ]);

                await device.transferOut(1, data.buffer);
                log("SINAL ENVIADO! VERIFIQUE O CELULAR.");
            } catch (e) {
                log("FALHA NO ENVIO: " + e.message);
            }
        }
    </script>
</body>
</html>
