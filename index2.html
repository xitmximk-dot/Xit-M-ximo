<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>XIT MÁXIMO | ULTIMATE SUPREMACY</title>
    <style>
        :root { --main: #ff0000; --bg: #050505; --accent: #111; --text: #fff; }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .panel {
            width: 380px;
            padding: 25px;
            background: var(--accent);
            border: 2px solid var(--main);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: var(--main);
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-size: 26px;
            text-shadow: 0 0 10px var(--main);
        }
        .section {
            background: #000;
            border: 1px solid #222;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .label {
            font-size: 10px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        select, button {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            background: #000;
            border: 1px solid var(--main);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: var(--main); color: #000; }
        button:disabled { border-color: #333; color: #333; cursor: not-allowed; }
        .terminal {
            height: 120px;
            background: #000;
            border: 1px solid #111;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            overflow-y: auto;
            margin-top: 15px;
            border-radius: 5px;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>XIT MÁXIMO</h1>

        <div class="section">
            <div class="label">Conexão de Hardware</div>
            <button id="btn-conn" onclick="conectar()">1. PAREAR USB (RSA)</button>
        </div>

        <div class="section">
            <div class="label">Configuração de Aimbot</div>
            <select id="aim-target">
                <option value="Pescoço">🎯 TRAVAR NO PESCOÇO</option>
                <option value="Cabeça">💀 TRAVAR NA CABEÇA</option>
                <option value="Peito">🛡️ TRAVAR NO PEITO (LEGIT)</option>
            </select>
            <div class="grid" style="margin-top: 10px;">
                <button onclick="optimizeFPS()" style="font-size: 10px;">OTIMIZAR FPS</button>
                <button onclick="reducePing()" style="font-size: 10px;">REDUZIR PING</button>
            </div>
            <div class="grid" style="margin-top: 10px;">
                <button onclick="cleanLogs()" style="font-size: 10px;">ANTI-BAN</button>
                <button onclick="hidePatches()" style="font-size: 10px;">HIDE PATCHES</button>
            </div>
        </div>

        <button id="btn-inj" onclick="injetar()" style="background: #fff; color: #000; font-size: 18px;" disabled>2. INJETAR AGORA</button>

        <div class="terminal" id="console">
            $ Aguardando Hardware USB...
        </div>
        <div class="status" id="status-line">Status: OFFLINE</div>
    </div>

    <script>
        let dev;

        function log(m, c = '#0f0') {
            const out = document.getElementById('console');
            out.innerHTML += `<br><span style="color:${c}">> ${m}</span>`;
            out.scrollTop = out.scrollHeight;
        }

        async function conectar() {
            try {
                log('Solicitando autorização USB...','#fff');
                dev = await navigator.usb.requestDevice({ filters: [] });
                await dev.open();
                await dev.reset();
                if (dev.configuration === null) await dev.selectConfiguration(1);
                await dev.claimInterface(0);

                const rsa = new Uint8Array([0x43,0x4e,0x4e,0x58,0x00,0x00,0x00,0x01,0x00,0x10,0x00,0x00]);
                await dev.transferOut(1, rsa.buffer);

                document.getElementById('btn-inj').disabled = false;
                document.getElementById('status-line').textContent = 'Status: USB PAREADO';
                document.getElementById('status-line').style.color = '#0f0';
                log('CONECTADO: ' + dev.productName, '#fff');
                log('ACEITE O RSA NO CELULAR!', '#f00');
            } catch (e) {
                log('ERRO: ' + (e.message || 'Falha na conexão.'), '#f00');
                if (e.message && e.message.toLowerCase().includes('busy')) log('DICA: Feche apps USB no celular.','#ff0');
                document.getElementById('status-line').textContent = 'Status: ERRO';
                document.getElementById('status-line').style.color = '#f00';
            }
        }

        function optimizeFPS() {
            log('Otimização de FPS iniciada...', '#fff');
            setTimeout(() => log('Frame rate estabilizado e lag reduzido.', '#0f0'), 800);
        }

        function reducePing() {
            log('Compressão de dados de rede ativada...', '#fff');
            setTimeout(() => log('Ping reduzido e conexão mais estável.', '#0f0'), 900);
        }

        function cleanLogs() {
            log('Cleaning Game Logs...', '#fff');
            setTimeout(() => log('Logs de sessão removidos com sucesso.', '#0f0'), 1200);
        }

        function hidePatches() {
            log('Hiding Sensitivity Patches...', '#fff');
            setTimeout(() => log('Patches ocultos para máxima discrição.', '#0f0'), 1200);
        }

        function injetar() {
            const target = document.getElementById('aim-target').value;
            log('Iniciando injeção bruta...', '#fff');
            setTimeout(() => {
                log('Bypassing Anticheat...','#fff');
                log('Fixando alvo: ' + target, '#f00');
                setTimeout(() => {
                    log('Magnetismo ativado. Pronto para FULL VERMELHO.','#f00');
                    alert('XIT MÁXIMO ATIVADO EM: ' + target + '!');
                }, 800);
            }, 800);
        }
    </script>
</body>
</html>
